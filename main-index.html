<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Living — Colecciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --wall:   #C4BFB8;
      --shelf-h: 28px;
      --shelf-depth: 18px;
      --accent: #C9A961;
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'Lato', sans-serif;
      --ease:   cubic-bezier(0.22, 1, 0.36, 1);
      --shelf-bottom: 30%;   /* repisa: borde superior queda aquí */
    }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background: var(--wall);
      font-family: var(--font-b);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════
       FONDO / PARED
    ══════════════════════════════ */
    .wall-bg {
      position:fixed; inset:0; z-index:0;
      background: linear-gradient(175deg, #CCC7BF 0%, #BAB5AE 55%, #B0ABA4 100%);
    }
    /* Textura sutil */
    .wall-bg::after {
      content:''; position:absolute; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='1' height='1' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E");
      background-size:4px 4px;
    }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    .gl-header {
      position:fixed; top:0; left:0; right:0; height:52px;
      display:flex; align-items:center; justify-content:center;
      z-index:200;
      background: linear-gradient(to bottom,rgba(0,0,0,0.18),transparent);
      pointer-events:none;
    }
    .gl-logo {
      font-family:var(--font-d); font-size:1rem; font-weight:300;
      letter-spacing:0.3em; text-transform:uppercase;
      color:rgba(255,255,255,0.9); text-shadow:0 1px 8px rgba(0,0,0,0.25);
    }
    .gl-logo em { font-style:italic; color:var(--accent); }

    /* ══════════════════════════════
       REPISA — siempre fija
    ══════════════════════════════ */
    .shelf {
      position:fixed;
      bottom: var(--shelf-bottom);
      left:0; right:0;
      height: calc(var(--shelf-h) + var(--shelf-depth));
      z-index:50;
      pointer-events:none;
    }
    /* Cara superior */
    .shelf-top {
      position:absolute; top:0; left:0; right:0;
      height: var(--shelf-h);
      background: linear-gradient(180deg, #D6D0C8 0%, #C8C2BA 100%);
      box-shadow: 0 -1px 0 rgba(255,255,255,0.3);
    }
    /* Cara frontal (profundidad) */
    .shelf-front {
      position:absolute;
      top: var(--shelf-h); left:0; right:0;
      height: var(--shelf-depth);
      background: linear-gradient(180deg, #9A938B 0%, #857E76 100%);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    /* Sombra debajo del frente */
    .shelf-shadow {
      position:absolute;
      top: calc(var(--shelf-h) + var(--shelf-depth));
      left:0; right:0; height:12px;
      background: linear-gradient(180deg, rgba(0,0,0,0.18), transparent);
    }
    /* Sombra de la revista sobre la repisa */
    .shelf-mag-shadow {
      position:absolute;
      top: calc(var(--shelf-h) - 6px);
      left:50%; transform:translateX(-50%);
      width:55%; height:10px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.28) 0%, transparent 70%);
      filter:blur(4px);
    }

    /* ══════════════════════════════
       ZONA ACTIVA — revista sobre repisa
    ══════════════════════════════ */
    .active-zone {
      position:fixed;
      /* desde top:52px (header) hasta la repisa */
      top: 52px;
      bottom: calc(var(--shelf-bottom) + var(--shelf-h) + var(--shelf-depth));
      left:0; right:0;
      display:flex; align-items:flex-end; justify-content:center;
      z-index:40;
      /* Para pan: overflow visible */
      overflow:visible;
      pointer-events:none;
    }

    /* ── REVISTA ACTIVA ── */
    .active-mag {
      position:relative;
      pointer-events:all;
      cursor:grab;
      touch-action:none;
      user-select:none;
      /* Inclinación 3D */
      transform-origin: bottom center;
      transform: rotateX(10deg) translate(0px, 0px);
      will-change: transform;
      /* Ancho responsivo */
      width: min(62vw, 320px);
      /* Animación entrada */
      animation: magIn 0.9s var(--ease) both;
    }
    .active-mag.dragging { cursor:grabbing; }
    .active-mag.swapping { 
      pointer-events:none;
      transition: opacity 0.35s ease; 
    }
    .active-mag.fade-out { opacity:0; }
    .active-mag.fade-in  { opacity:1; }

    @keyframes magIn {
      from { opacity:0; transform: rotateX(10deg) translateY(30px); }
      to   { opacity:1; transform: rotateX(10deg) translate(0,0); }
    }

    .mag-body {
      width:100%;
      aspect-ratio: 148 / 210;
      border-radius: 3px 6px 6px 3px;
      overflow:hidden;
      position:relative;
      box-shadow:
        3px 8px 24px rgba(0,0,0,0.38),
        inset -2px 0 6px rgba(0,0,0,0.12);
      transition: box-shadow 0.3s ease;
    }
    .active-mag:hover .mag-body {
      box-shadow:
        5px 12px 32px rgba(0,0,0,0.45),
        inset -2px 0 6px rgba(0,0,0,0.12);
    }

    /* Lomo */
    .mag-spine {
      position:absolute; left:0; top:0; bottom:0; width:10px;
      background:linear-gradient(90deg, rgba(0,0,0,0.42), rgba(0,0,0,0.14));
      z-index:5; border-radius:3px 0 0 3px;
    }

    .mag-inner {
      position:absolute; inset:0; left:10px;
      display:flex; flex-direction:column;
      overflow:hidden; border-radius:0 5px 5px 0;
      background:#FAFAF8;
    }
    .mag-head {
      flex-shrink:0; padding:11px 12px 8px;
      display:flex; flex-direction:column; gap:3px;
    }
    .mag-name {
      font-family:var(--font-d); font-size:clamp(0.7rem,2.2vw,0.9rem);
      font-weight:600; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.96); line-height:1.1;
    }
    .mag-sub {
      font-size:clamp(0.46rem,1.4vw,0.54rem); font-weight:300;
      letter-spacing:0.1em; text-transform:uppercase;
      color:rgba(255,255,255,0.58);
    }
    .mag-img-wrap {
      flex:1; position:relative; overflow:hidden;
      background:#E8E4DE; min-height:0;
    }
    .mag-img {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; display:block;
      transition: opacity 0.4s ease;
    }
    .mag-img.fading { opacity:0; }
    .mag-foot {
      flex-shrink:0; padding:7px 12px;
      display:flex; justify-content:space-between; align-items:center;
      border-top:1px solid rgba(0,0,0,0.07);
      background:#F4F1ED;
    }
    .mag-foot-l {
      font-size:clamp(0.44rem,1.3vw,0.52rem);
      letter-spacing:0.07em; text-transform:uppercase; color:#999;
    }
    .mag-foot-r {
      font-size:clamp(0.44rem,1.3vw,0.52rem);
      letter-spacing:0.07em; text-transform:uppercase;
      font-weight:700; color:var(--accent);
    }
    /* Badge próximamente sobre activa */
    .mag-soon {
      position:absolute; inset:0; left:10px;
      background:rgba(0,0,0,0.48);
      display:flex; align-items:center; justify-content:center;
      border-radius:0 5px 5px 0; z-index:10;
      opacity:0; transition:opacity 0.3s;
    }
    .mag-body:hover .mag-soon { opacity:1; }
    .mag-soon span {
      font-family:var(--font-d); font-size:clamp(0.58rem,1.8vw,0.72rem);
      font-weight:300; letter-spacing:0.22em; text-transform:uppercase;
      color:rgba(255,255,255,0.8);
    }

    /* Hint doble tap — aparece sobre la revista activa */
    .dbl-hint {
      position:absolute; bottom:calc(100% + 12px); left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.32); backdrop-filter:blur(4px);
      color:rgba(255,255,255,0.8); font-size:0.6rem;
      letter-spacing:0.1em; text-transform:uppercase;
      padding:5px 14px; border-radius:100px;
      white-space:nowrap; pointer-events:none;
      opacity:0; animation:hintPop 5s var(--ease) 1.2s forwards;
    }
    @keyframes hintPop {
      0%  { opacity:0; transform:translateX(-50%) translateY(4px); }
      15% { opacity:1; transform:translateX(-50%) translateY(0); }
      75% { opacity:1; }
      100%{ opacity:0; }
    }

    /* ══════════════════════════════
       ZONA GRID — miniaturas debajo repisa
    ══════════════════════════════ */
    .grid-zone {
      position:fixed;
      top: calc(100% - var(--shelf-bottom) + var(--shelf-h) + var(--shelf-depth) + 14px);
      /* equivale a: justo debajo de la sombra de la repisa */
      bottom: 0;
      left:0; right:0;
      display:flex; align-items:center; justify-content:center;
      gap: clamp(10px, 3vw, 28px);
      padding: 0 16px 10px;
      z-index:40;
      overflow:hidden;
    }

    /* ── MINIATURA ── */
    .mini-mag {
      position:relative;
      flex: 0 0 auto;
      width: min(26vw, 110px);
      cursor:pointer;
      transform-origin: bottom center;
      transform: rotateX(8deg);
      transition: transform 0.28s var(--ease), filter 0.2s;
      animation: miniIn 0.7s var(--ease) both;
      filter: brightness(0.92);
    }
    .mini-mag:nth-child(1){animation-delay:0.1s}
    .mini-mag:nth-child(2){animation-delay:0.2s}
    .mini-mag:nth-child(3){animation-delay:0.3s}
    @keyframes miniIn {
      from { opacity:0; transform:rotateX(8deg) translateY(20px); }
      to   { opacity:1; transform:rotateX(8deg) translateY(0); }
    }
    .mini-mag:hover {
      transform: rotateX(8deg) translateY(-5px) scale(1.05);
      filter: brightness(1);
    }
    .mini-mag:active {
      transform: rotateX(8deg) scale(0.97);
    }
    .mini-body {
      width:100%;
      aspect-ratio: 148 / 200;
      border-radius:2px 5px 5px 2px;
      overflow:hidden; position:relative;
      box-shadow:
        2px 5px 14px rgba(0,0,0,0.3),
        inset -1px 0 4px rgba(0,0,0,0.1);
    }
    .mini-spine {
      position:absolute; left:0; top:0; bottom:0; width:7px;
      background:linear-gradient(90deg,rgba(0,0,0,0.4),rgba(0,0,0,0.1));
      z-index:5;
    }
    .mini-inner {
      position:absolute; inset:0; left:7px;
      display:flex; flex-direction:column;
      overflow:hidden; border-radius:0 4px 4px 0;
      background:#FAFAF8;
    }
    .mini-head {
      flex-shrink:0; padding:7px 8px 5px;
    }
    .mini-name {
      font-family:var(--font-d); font-size:clamp(0.55rem,1.7vw,0.68rem);
      font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
      color:rgba(255,255,255,0.95); line-height:1.1;
    }
    .mini-img-wrap {
      flex:1; overflow:hidden; position:relative; min-height:0;
    }
    .mini-img {
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; display:block;
    }
    /* Badge próx en miniatura */
    .mini-soon {
      position:absolute; inset:0; left:7px;
      background:rgba(0,0,0,0.38);
      display:flex; align-items:center; justify-content:center;
      z-index:10;
    }
    .mini-soon span {
      font-family:var(--font-d); font-size:clamp(0.42rem,1.3vw,0.52rem);
      letter-spacing:0.15em; text-transform:uppercase;
      color:rgba(255,255,255,0.7);
      writing-mode:vertical-rl;
    }
    /* Nombre debajo */
    .mini-label {
      text-align:center; margin-top:5px;
      font-size:clamp(0.48rem,1.5vw,0.58rem);
      letter-spacing:0.1em; text-transform:uppercase;
      color:rgba(255,255,255,0.55);
    }

    /* Miniatura en estado "seleccionando" (fly up) */
    .mini-mag.flying {
      transition: transform 0.45s var(--ease), opacity 0.45s ease;
      transform: rotateX(0deg) translateY(-120px) scale(1.1);
      opacity:0;
      pointer-events:none;
    }
    /* Miniatura que "baja" (activa anterior) */
    .mini-mag.dropping {
      animation: dropIn 0.5s var(--ease) both;
    }
    @keyframes dropIn {
      from { opacity:0; transform:rotateX(8deg) translateY(-30px); }
      to   { opacity:1; transform:rotateX(8deg) translateY(0); }
    }

    /* ══════════════════════════════
       OVERLAY NAVEGACIÓN
    ══════════════════════════════ */
    .go-overlay {
      position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 0.35s ease;
    }
    .go-overlay.show { opacity:1; }
    .go-overlay span {
      font-family:var(--font-d); font-size:1.1rem; font-weight:300;
      letter-spacing:0.18em; color:#fff;
    }

    /* ══════════════════════════════
       HINT GLOBAL
    ══════════════════════════════ */
    .global-hint {
      position:fixed; bottom:14px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.26); backdrop-filter:blur(5px);
      color:rgba(255,255,255,0.75); font-size:0.62rem;
      letter-spacing:0.08em; text-transform:uppercase;
      padding:6px 16px; border-radius:100px;
      white-space:nowrap; pointer-events:none; z-index:300;
      animation:ghFade 5s var(--ease) 0.5s forwards;
    }
    @keyframes ghFade {
      0%  {opacity:0;transform:translateX(-50%) translateY(4px)}
      10% {opacity:1;transform:translateX(-50%) translateY(0)}
      75% {opacity:1}
      100%{opacity:0;pointer-events:none}
    }

    /* ══════════════════════════════
       RESPONSIVE TWEAKS
    ══════════════════════════════ */
    @media (max-width: 480px) {
      :root { --shelf-bottom: 28%; }
      .active-mag { width: min(72vw, 240px); }
      .mini-mag   { width: min(24vw, 90px); }
    }
    @media (min-width: 900px) {
      :root { --shelf-bottom: 34%; }
      .active-mag { width: min(52vw, 340px); }
      .mini-mag   { width: min(18vw, 140px); }
    }
  </style>
</head>
<body>

<!-- Fondo pared -->
<div class="wall-bg"></div>

<!-- Header -->
<header class="gl-header">
  <div class="gl-logo">G-<em>Living</em> &nbsp;·&nbsp; Colecciones</div>
</header>

<!-- Repisa fija -->
<div class="shelf">
  <div class="shelf-mag-shadow"></div>
  <div class="shelf-top"></div>
  <div class="shelf-front"></div>
  <div class="shelf-shadow"></div>
</div>

<!-- Zona revista activa (encima repisa) -->
<div class="active-zone" id="activeZone">
  <div class="active-mag" id="activeMag">
    <!-- Hint doble tap — solo visible al inicio -->
    <div class="dbl-hint" id="dblHint">Doble toque para entrar</div>
    <div class="mag-body">
      <div class="mag-spine"></div>
      <div class="mag-inner">
        <div class="mag-head" id="activeHead" style="background:#3A3228">
          <div class="mag-name" id="activeName">Imolarte</div>
          <div class="mag-sub"  id="activeSub">by Helena Caballero</div>
        </div>
        <div class="mag-img-wrap">
          <img class="mag-img" id="activeImg" src="" alt="">
        </div>
        <div class="mag-foot">
          <span class="mag-foot-l" id="activeFootL">Cerámica italiana</span>
          <span class="mag-foot-r" id="activeFootR">Ver →</span>
        </div>
        <!-- Badge próx (oculto si activa tiene link) -->
        <div class="mag-soon" id="activeSoon" style="display:none">
          <span>Próximamente</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Zona grid miniaturas (debajo repisa) -->
<div class="grid-zone" id="gridZone"></div>

<!-- Overlay navegación -->
<div class="go-overlay" id="goOverlay"><span>Abriendo catálogo…</span></div>

<!-- Hint global -->
<div class="global-hint">Arrastra · Doble toque para entrar · Toca una colección abajo</div>

<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════
   DATOS DE MARCAS
══════════════════════════════════════════════ */
const BRANDS = [
  {
    id:      'imolarte',
    name:    'Imolarte',
    sub:     'by Helena Caballero',
    foot:    'Cerámica italiana',
    color:   '#3A3228',
    url:     'imolarte/index.html',
    live:    true,
    folder:  'Imolarte',
    files:   ['imolarte-portada1.jpg','imolarte-portada2.jpg','imolarte-portada3.jpg','imolarte-portada4.jpg','imolarte-portada5.jpg'],
  },
  {
    id:      'mlg',
    name:    'MLG',
    sub:     'Colección',
    foot:    'Moda · Lifestyle',
    color:   '#2C4A3E',
    url:     '#',
    live:    false,
    folder:  'MLG',
    files:   ['MLG-portada1.jpg','MLG-portada2.jpg','MLG-portada3.jpg','MLG-portada4.jpg','MLG-portada5.jpg'],
  },
  {
    id:      'tessitura',
    name:    'Tessitura',
    sub:     'Toscana',
    foot:    'Textil · Toscana',
    color:   '#4A3828',
    url:     '#',
    live:    false,
    folder:  'Tessitura-Toscana',
    files:   ['Tessitura-Toscana-portada1.jpg','Tessitura-Toscana-portada2.jpg','Tessitura-Toscana-portada3.jpg','Tessitura-Toscana-portada4.jpg','Tessitura-Toscana-portada5.jpg'],
  },
  {
    id:      'eme',
    name:    'EME',
    sub:     'Diseño · Arte',
    foot:    'Diseño · Arte',
    color:   '#2C3A4A',
    url:     '#',
    live:    false,
    folder:  'EME',
    files:   ['EME-portada-1.jpg','EME-portada-2.jpg','EME-portada-3.jpg','EME-portada-4.jpg','EME-portada-5.jpg'],
  },
];
const BASE = 'images-revista/';
const COOKIE_DAYS = 7;

/* ══════════════════════════════════════════════
   COOKIES — portada por sesión
══════════════════════════════════════════════ */
function setCookie(name, val, days){
  const d = new Date();
  d.setTime(d.getTime() + days*24*60*60*1000);
  document.cookie = name+'='+val+';expires='+d.toUTCString()+';path=/;SameSite=Lax';
}
function getCookie(name){
  const v = document.cookie.match('(?:^|; )'+name+'=([^;]*)');
  return v ? decodeURIComponent(v[1]) : null;
}
function getPortadaIdx(brand){
  const raw = getCookie('gl_portada_'+brand.id);
  const prev = raw !== null ? parseInt(raw, 10) : -1;
  // Si hay cookie → siguiente portada; si no → aleatoria
  if(prev >= 0) return (prev + 1) % brand.files.length;
  return Math.floor(Math.random() * brand.files.length);
}
function savePortadas(){
  // Guardar índice actual de cada brand
  BRANDS.forEach(b => setCookie('gl_portada_'+b.id, portadaState[b.id], COOKIE_DAYS));
}
// Estado de índices actuales
const portadaState = {};
BRANDS.forEach(b => { portadaState[b.id] = getPortadaIdx(b); });
// Guardar al salir
window.addEventListener('pagehide', savePortadas);
window.addEventListener('beforeunload', savePortadas);

/* ══════════════════════════════════════════════
   ESTADO
══════════════════════════════════════════════ */
let activeIdx = 0; // índice en BRANDS del activo

/* ══════════════════════════════════════════════
   REFS DOM
══════════════════════════════════════════════ */
const activeMag  = document.getElementById('activeMag');
const activeHead = document.getElementById('activeHead');
const activeName = document.getElementById('activeName');
const activeSub  = document.getElementById('activeSub');
const activeImg  = document.getElementById('activeImg');
const activeFootL= document.getElementById('activeFootL');
const activeFootR= document.getElementById('activeFootR');
const activeSoon = document.getElementById('activeSoon');
const gridZone   = document.getElementById('gridZone');
const goOverlay  = document.getElementById('goOverlay');

/* ══════════════════════════════════════════════
   RENDER ACTIVA
══════════════════════════════════════════════ */
function renderActive(brand){
  activeHead.style.background = brand.color;
  activeName.textContent = brand.name;
  activeSub.textContent  = brand.sub;
  activeFootL.textContent= brand.foot;
  activeFootR.textContent= brand.live ? 'Ver →' : '';
  activeSoon.style.display = brand.live ? 'none' : 'flex';
  const img = brand.files[portadaState[brand.id]];
  activeImg.src = BASE + brand.folder + '/' + img;
  activeImg.alt = brand.name;
  // Reset pan
  panX=0; panY=0; applyPan();
}

/* ══════════════════════════════════════════════
   RENDER GRID (3 miniaturas — las no-activas)
══════════════════════════════════════════════ */
function renderGrid(){
  gridZone.innerHTML = '';
  BRANDS.forEach((brand, idx) => {
    if(idx === activeIdx) return; // saltar la activa

    const wrap = document.createElement('div');
    wrap.className = 'mini-mag';
    wrap.dataset.idx = idx;

    const img = brand.files[portadaState[brand.id]];
    wrap.innerHTML = `
      <div class="mini-body">
        <div class="mini-spine"></div>
        <div class="mini-inner">
          <div class="mini-head" style="background:${brand.color}">
            <div class="mini-name">${brand.name}</div>
          </div>
          <div class="mini-img-wrap">
            <img class="mini-img" src="${BASE}${brand.folder}/${img}" alt="${brand.name}" loading="lazy">
          </div>
        </div>
        ${!brand.live ? '<div class="mini-soon"><span>Próx.</span></div>' : ''}
      </div>
      <div class="mini-label">${brand.name}</div>
    `;

    wrap.addEventListener('click', () => swapActive(idx, wrap));
    gridZone.appendChild(wrap);
  });
}

/* ══════════════════════════════════════════════
   SWAP — cambiar marca activa
══════════════════════════════════════════════ */
function swapActive(newIdx, miniEl){
  if(newIdx === activeIdx) return;

  // Animación miniatura: "vuela" hacia arriba
  if(miniEl){
    miniEl.classList.add('flying');
  }

  // Fade out revista activa
  activeMag.classList.add('swapping','fade-out');

  setTimeout(() => {
    activeIdx = newIdx;
    renderActive(BRANDS[activeIdx]);
    renderGrid(); // actualiza miniaturas

    // La nueva miniatura bajada tendrá clase dropping (añadida en renderGrid)
    // El nuevo miniatura del prev activo: animarla como "drop"
    // Buscar el elemento del ex-activo en el nuevo grid
    const exEl = gridZone.querySelector(`[data-idx]`);
    if(exEl) exEl.classList.add('dropping');

    // Fade in revista activa
    activeMag.style.opacity = '0';
    activeMag.classList.remove('fade-out');
    activeMag.style.animation = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        activeMag.style.transition = 'opacity 0.35s ease';
        activeMag.style.opacity = '1';
        setTimeout(() => {
          activeMag.style.transition = '';
          activeMag.classList.remove('swapping');
        }, 380);
      });
    });
  }, 420);
}

/* ══════════════════════════════════════════════
   PAN — drag de la revista activa
══════════════════════════════════════════════ */
let panX=0, panY=0;
let dragging=false, didDrag=false;
let startX=0, startY=0, startPX=0, startPY=0;
const PAN_LIMIT_X = 160, PAN_LIMIT_Y = 100;

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function applyPan(){
  activeMag.style.transform = `rotateX(10deg) translate(${panX}px, ${panY}px)`;
}

// Mouse
activeMag.addEventListener('mousedown', e => {
  if(e.button !== 0) return;
  dragging=true; didDrag=false;
  startX=e.clientX; startY=e.clientY;
  startPX=panX; startPY=panY;
  activeMag.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  const dx=e.clientX-startX, dy=e.clientY-startY;
  if(Math.abs(dx)>5||Math.abs(dy)>5) didDrag=true;
  panX=clamp(startPX+dx,-PAN_LIMIT_X,PAN_LIMIT_X);
  panY=clamp(startPY+dy,-PAN_LIMIT_Y,PAN_LIMIT_Y);
  applyPan();
});
window.addEventListener('mouseup', () => {
  dragging=false;
  activeMag.classList.remove('dragging');
});

// Double click
activeMag.addEventListener('dblclick', e => {
  if(didDrag) return;
  openActive();
});

// Touch — pan + double tap
let touchStart={x:0,y:0}, touchPanStart={x:0,y:0};
let tDragging=false, tDidMove=false;
let lastTap=0;

activeMag.addEventListener('touchstart', e => {
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  touchStart={x:t.clientX,y:t.clientY};
  touchPanStart={x:panX,y:panY};
  tDragging=true; tDidMove=false;
  // Double tap detect
  const now=Date.now();
  if(now-lastTap<340){ openActive(); lastTap=0; return; }
  lastTap=now;
  e.preventDefault();
},{passive:false});

activeMag.addEventListener('touchmove', e => {
  if(!tDragging||e.touches.length!==1) return;
  const t=e.touches[0];
  const dx=t.clientX-touchStart.x, dy=t.clientY-touchStart.y;
  if(Math.abs(dx)>5||Math.abs(dy)>5) tDidMove=true;
  panX=clamp(touchPanStart.x+dx,-PAN_LIMIT_X,PAN_LIMIT_X);
  panY=clamp(touchPanStart.y+dy,-PAN_LIMIT_Y,PAN_LIMIT_Y);
  applyPan();
  e.preventDefault();
},{passive:false});

activeMag.addEventListener('touchend', () => { tDragging=false; });

/* ══════════════════════════════════════════════
   ABRIR CATÁLOGO
══════════════════════════════════════════════ */
function openActive(){
  const brand = BRANDS[activeIdx];
  if(!brand.live) return;
  savePortadas();
  goOverlay.classList.add('show');
  setTimeout(() => { window.location.href = brand.url; }, 600);
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
renderActive(BRANDS[activeIdx]);
renderGrid();

})();
</script>
</body>
</html>
