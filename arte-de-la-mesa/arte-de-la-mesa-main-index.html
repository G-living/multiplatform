<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Living — Arte de la Mesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --accent:      #C9A961;
      --font-d:      'Cormorant Garamond', Georgia, serif;
      --font-b:      'Lato', sans-serif;
      --ease:        cubic-bezier(0.22, 1, 0.36, 1);
      --wall:        #D6D6D0;          /* gris pared */
      --shelf-col:   #E8E4DC;          /* madera clara esvelta */
      --shelf-h:     18px;
      --shelf-front: 10px;
      --shelf-y:     72%;              /* posición desde top */
    }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      font-family:var(--font-b);
      -webkit-font-smoothing:antialiased;
      background:var(--wall);
    }

    /* ─── PARED ──────────────────────────────────── */
    .wall {
      position:fixed; inset:0; z-index:0;
      background:
        /* textura sutil — líneas horizontales muy finas */
        repeating-linear-gradient(
          180deg,
          transparent 0px,
          transparent 3px,
          rgba(0,0,0,0.012) 3px,
          rgba(0,0,0,0.012) 4px
        ),
        /* gradiente atmosférico */
        radial-gradient(ellipse at 50% 30%, #DDDDD8 0%, #C8C8C2 100%);
    }
    /* sombra perimetral */
    .wall::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.13) 100%);
    }

    /* ─── HEADER ─────────────────────────────────── */
    .gl-header {
      position:fixed; top:0; left:0; right:0; z-index:100;
      height:52px;
      display:flex; align-items:center; justify-content:center;
      background:linear-gradient(to bottom, rgba(0,0,0,0.10), transparent);
    }
    .header-logo {
      height:28px; width:auto;
      object-fit:contain;
      filter:drop-shadow(0 1px 3px rgba(0,0,0,0.25));
    }
    .header-logo-fallback {
      font-family:var(--font-d);
      font-size:0.80rem; font-weight:300;
      letter-spacing:0.32em; text-transform:uppercase;
      color:rgba(255,255,255,0.88);
      display:none;
    }
    .header-logo-fallback em { font-style:italic; color:var(--accent); }

    /* ─── REPISA ─────────────────────────────────── */
    .shelf-wrap {
      position:fixed;
      top:var(--shelf-y);
      left:0; right:0;
      z-index:20;
      pointer-events:none;
    }
    /* tablero superior */
    .shelf-top {
      height:var(--shelf-h);
      background:linear-gradient(180deg,
        #F5F2EC 0%,
        #EAE6DC 30%,
        #D8D3C6 70%,
        #C8C2B2 100%
      );
      box-shadow:
        0 -1px 0 rgba(255,255,255,0.55),
        0  2px 6px rgba(0,0,0,0.18),
        0  4px 12px rgba(0,0,0,0.10);
      /* veta de madera */
      background-image:
        linear-gradient(180deg, #F5F2EC 0%, #C8C2B2 100%),
        repeating-linear-gradient(90deg,
          transparent 0px, transparent 28px,
          rgba(0,0,0,0.025) 28px, rgba(0,0,0,0.025) 30px
        );
      background-blend-mode: multiply;
    }
    /* frente de la repisa */
    .shelf-front {
      height:var(--shelf-front);
      background:linear-gradient(180deg, #BDB8A8 0%, #A8A296 100%);
      box-shadow:0 3px 8px rgba(0,0,0,0.18);
    }
    /* sombra proyectada en pared */
    .shelf-shadow {
      height:20px;
      background:linear-gradient(180deg,
        rgba(0,0,0,0.12) 0%,
        transparent 100%
      );
      margin-top:-18px; /* sobre el tablero */
      pointer-events:none;
    }

    /* ─── ESCENARIO ──────────────────────────────── */
    .stage {
      position:fixed; inset:0; z-index:10;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      /* alinear el fondo de las revistas con el tablero de la repisa */
      padding-bottom:calc(100% - var(--shelf-y) - var(--shelf-h) * 0.5);
      padding-bottom: calc((100vh - (100vh * 0.72)) + 0px);
      pointer-events:none;
    }

    /* ─── FILA DE REVISTAS ───────────────────────── */
    .shelf-row {
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:clamp(16px, 3vw, 36px);
      padding:0 clamp(16px, 4vw, 48px);
      pointer-events:all;
      /* descansan exactamente sobre el tablero */
      position:fixed;
      bottom:calc(100vh - (100vh * var(--shelf-pct, 0.72)) - 0px);
      left:0; right:0;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:clamp(14px, 2.8vw, 32px);
      padding:0 clamp(16px, 5vw, 60px);
    }

    /* ─── TARJETA REVISTA ────────────────────────── */
    .mag-card {
      position:relative;
      width:clamp(100px, 16vw, 160px);
      aspect-ratio:148/210;
      border-radius:2px 5px 5px 2px;
      overflow:hidden;
      cursor:pointer;
      pointer-events:all;
      box-shadow:
        3px 8px 20px rgba(0,0,0,0.35),
        1px 2px 6px rgba(0,0,0,0.20),
        inset -2px 0 5px rgba(0,0,0,0.08);
      transform:translateY(0);
      transition:transform 0.30s var(--ease), box-shadow 0.30s var(--ease);
      animation:cardIn 0.7s var(--ease) both;
    }
    .mag-card:nth-child(1){ animation-delay:0.05s; }
    .mag-card:nth-child(2){ animation-delay:0.12s; }
    .mag-card:nth-child(3){ animation-delay:0.19s; }
    .mag-card:nth-child(4){ animation-delay:0.26s; }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .mag-card.is-live:hover,
    .mag-card.is-live:focus-visible {
      transform:translateY(-10px);
      box-shadow:
        4px 18px 36px rgba(0,0,0,0.40),
        2px 4px 10px rgba(0,0,0,0.22);
      outline:none;
    }
    .mag-card.is-live { cursor:pointer; }
    .mag-card:not(.is-live) { cursor:default; }

    /* Lomo */
    .mag-spine {
      position:absolute; left:0; top:0; bottom:0; width:9px; z-index:5;
      background:linear-gradient(90deg, rgba(0,0,0,0.40), rgba(0,0,0,0.08));
      border-radius:2px 0 0 2px;
    }

    /* Portada */
    .mag-cover {
      position:absolute; inset:0; left:9px;
      display:flex; flex-direction:column;
      background:#FAFAF8;
      border-radius:0 4px 4px 0;
      overflow:hidden;
    }

    /* Header de color de marca */
    .mag-head {
      flex-shrink:0;
      padding:8px 10px 6px;
      display:flex; flex-direction:column; gap:2px;
    }
    .mag-brand-name {
      font-family:var(--font-d);
      font-size:clamp(0.55rem, 1.8vw, 0.78rem);
      font-weight:600;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.95);
      line-height:1.1;
    }
    .mag-brand-sub {
      font-size:clamp(0.38rem, 1.1vw, 0.46rem);
      font-weight:300;
      letter-spacing:0.10em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.55);
    }

    /* Imagen portada */
    .mag-img-wrap {
      flex:1; position:relative; overflow:hidden;
      background:#E8E4DE; min-height:0;
    }
    .mag-img {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover; display:block;
    }

    /* Pie */
    .mag-foot {
      flex-shrink:0;
      padding:5px 10px;
      display:flex; justify-content:space-between; align-items:center;
      border-top:1px solid rgba(0,0,0,0.07);
      background:#F0EDE6;
    }
    .mag-foot-label {
      font-size:clamp(0.38rem, 1.1vw, 0.44rem);
      letter-spacing:0.06em;
      text-transform:uppercase;
      color:#999;
    }
    .mag-foot-cta {
      font-size:clamp(0.38rem, 1.1vw, 0.44rem);
      letter-spacing:0.06em;
      text-transform:uppercase;
      font-weight:700;
      color:var(--accent);
    }

    /* Badge Próximamente */
    .mag-soon {
      position:absolute;
      top:8px; right:8px;
      background:rgba(0,0,0,0.52);
      backdrop-filter:blur(3px);
      color:rgba(255,255,255,0.80);
      font-family:var(--font-b);
      font-size:clamp(0.34rem, 1vw, 0.40rem);
      font-weight:700;
      letter-spacing:0.14em;
      text-transform:uppercase;
      padding:3px 7px;
      border-radius:100px;
      z-index:10;
      pointer-events:none;
    }

    /* ─── OVERLAY TRANSICIÓN ─────────────────────── */
    .go-overlay {
      position:fixed; inset:0; z-index:500;
      background:rgba(255,255,255,0);
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      transition:background 0.55s ease;
    }
    .go-overlay.show {
      pointer-events:all;
      background:rgba(255,255,255,0.96);
    }
    .go-overlay span {
      font-family:var(--font-d);
      font-size:1rem; font-weight:300;
      letter-spacing:0.25em; text-transform:uppercase;
      color:#888; opacity:0;
      transition:opacity 0.3s ease 0.15s;
    }
    .go-overlay.show span { opacity:1; }

  </style>
</head>
<body>

  <!-- PARED -->
  <div class="wall"></div>

  <!-- HEADER -->
  <header class="gl-header">
    <img
      class="header-logo"
      src="imolarte/images/branding/Logo-HC.jpeg"
      alt="G-Living · Helena Caballero"
      onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'"
    >
    <span class="header-logo-fallback" id="logoFallback"><em>G</em>-Living</span>
  </header>

  <!-- REPISA -->
  <div class="shelf-wrap" id="shelfWrap">
    <div class="shelf-shadow"></div>
    <div class="shelf-top"></div>
    <div class="shelf-front"></div>
  </div>

  <!-- FILA DE REVISTAS -->
  <div class="shelf-row" id="shelfRow">
    <!-- Generado por JS -->
  </div>

  <!-- OVERLAY TRANSICIÓN -->
  <div class="go-overlay" id="goOverlay"><span>Abriendo cat&aacute;logo&hellip;</span></div>

<script>
(function(){
'use strict';

/* ── DATOS ── */
const BRANDS = [
  { id:'imolarte', name:'Imolarte', sub:'by Helena Caballero', foot:'Cerámica italiana',
    color:'#3A3228',
    url:'imolarte/index.html', live:true, folder:'Imolarte',
    files:['imolarte-portada1.jpg','imolarte-portada2.jpg','imolarte-portada3.jpg','imolarte-portada4.jpg','imolarte-portada5.jpg'] },
  { id:'mlg', name:'Mario Luca Giusti', sub:'Synthetic Crystal', foot:'Arte de la Mesa',
    color:'#2C4A3E',
    url:'MLG/index.html', live:true, folder:'MLG',
    files:['MLG-portada1.jpg','MLG-portada2.jpg','MLG-portada3.jpg','MLG-portada4.jpg','MLG-portada5.jpg'] },
  { id:'tessitura', name:'Tessitura Toscana', sub:'Textiles · Italia', foot:'Próximamente',
    color:'#4A3828',
    url:'#', live:false, folder:'Tessitura-Toscana',
    files:['Tessitura-Toscana-portada1.jpg','Tessitura-Toscana-portada2.jpg','Tessitura-Toscana-portada3.jpg','Tessitura-Toscana-portada4.jpg','Tessitura-Toscana-portada5.jpg'] },
  { id:'eme', name:'EME', sub:'Diseño · Arte', foot:'Próximamente',
    color:'#2C3A4A',
    url:'#', live:false, folder:'EME',
    files:['EME-portada-1.jpg','EME-portada-2.jpg','EME-portada-3.jpg','EME-portada-4.jpg','EME-portada-5.jpg'] },
];

const BASE        = 'images-revista-arte-de-la-mesa/';
const COOKIE_DAYS = 7;

/* ── COOKIES — portada rota por sesión ── */
function setCookie(n,v,d){ const e=new Date();e.setTime(e.getTime()+d*864e5);document.cookie=n+'='+v+';expires='+e.toUTCString()+';path=/;SameSite=Lax'; }
function getCookie(n){ const v=document.cookie.match('(?:^|; )'+n+'=([^;]*)');return v?decodeURIComponent(v[1]):null; }
function getPortadaIdx(b){
  const saved=getCookie('gl_portada_'+b.id);
  const prev=saved!==null?parseInt(saved,10):-1;
  return prev>=0?(prev+1)%b.files.length:Math.floor(Math.random()*b.files.length);
}
function savePortadas(){ BRANDS.forEach(b=>setCookie('gl_portada_'+b.id, portadaState[b.id], COOKIE_DAYS)); }

const portadaState={};
BRANDS.forEach(b=>{ portadaState[b.id]=getPortadaIdx(b); });
window.addEventListener('pagehide', savePortadas);
window.addEventListener('beforeunload', savePortadas);

/* ── POSICIONAR REPISA Y ROW ── */
function positionShelf(){
  const vh = window.innerHeight;
  const shelfTopPx = Math.round(vh * 0.72);   // 72% desde arriba
  document.getElementById('shelfWrap').style.top = shelfTopPx + 'px';
  // La fila de revistas: su base queda exactamente sobre el tablero
  document.getElementById('shelfRow').style.bottom = (vh - shelfTopPx) + 'px';
}
positionShelf();
window.addEventListener('resize', positionShelf);

/* ── RENDER TARJETAS ── */
const row = document.getElementById('shelfRow');

BRANDS.forEach(b => {
  const src   = BASE + b.folder + '/' + b.files[portadaState[b.id]];
  const card  = document.createElement('div');
  card.className = 'mag-card' + (b.live ? ' is-live' : '');
  card.setAttribute('role', b.live ? 'button' : 'img');
  card.setAttribute('aria-label', b.name + (b.live ? ' — ver catálogo' : ' — próximamente'));
  if(b.live) { card.setAttribute('tabindex','0'); }

  card.innerHTML =
    '<div class="mag-spine"></div>' +
    '<div class="mag-cover">' +
      '<div class="mag-head" style="background:' + b.color + '">' +
        '<span class="mag-brand-name">' + b.name + '</span>' +
        '<span class="mag-brand-sub">' + b.sub + '</span>' +
      '</div>' +
      '<div class="mag-img-wrap">' +
        '<img class="mag-img" src="' + src + '" alt="' + b.name + '" loading="eager" ' +
          'onerror="this.style.opacity='0'">' +
      '</div>' +
      '<div class="mag-foot">' +
        '<span class="mag-foot-label">' + b.foot + '</span>' +
        (b.live ? '<span class="mag-foot-cta">Ver →</span>' : '') +
      '</div>' +
    '</div>' +
    (!b.live ? '<span class="mag-soon">Próximamente</span>' : '');

  if(b.live){
    card.addEventListener('click', () => openBrand(b));
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openBrand(b); } });
  }

  row.appendChild(card);
});

/* ── ABRIR CATÁLOGO ── */
function openBrand(b){
  if(!b.live) return;
  savePortadas();
  const ov = document.getElementById('goOverlay');
  ov.classList.add('show');
  setTimeout(() => { window.location.href = b.url; }, 580);
}

})();
</script>
</body>
</html>
