<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Living — Colecciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --accent:       #C9A961;
      --font-d:       'Cormorant Garamond', Georgia, serif;
      --font-b:       'Lato', sans-serif;
      --ease:         cubic-bezier(0.22, 1, 0.36, 1);
      --shelf-h:      26px;
      --shelf-front:  16px;
      --shelf-bottom: 32%;
      --niche-h:      30%;
      --logo-bar-h:   46px;
      --header-h:     var(--logo-bar-h);
    }
    html, body { width:100%; height:100%; overflow:hidden; font-family:var(--font-b); -webkit-font-smoothing:antialiased; }

    /* ─── WALLPAPER ─────────────────────────────── */
    .wall-bg {
      position:fixed; inset:0; z-index:0;
      background-color:#C8B89A;
      background-image: url('images-wall/wall-missoni.jpg');
      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;
    }
    /* sombra perimetral muy suave para dar marco */
    .wall-bg::after {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 50% 40%, transparent 55%, rgba(0,0,0,0.18) 100%);
    }

    /* ─── HEADER / BACK BTN ─────────────────────── */
    .gl-header { position:fixed; top:0; left:0; right:0; z-index:200; pointer-events:none; }
    .logo-bar {
      height:var(--logo-bar-h);
      display:flex; align-items:center; justify-content:center;
      position:relative;
      background:linear-gradient(to bottom,rgba(0,0,0,0.18),transparent);
    }
    .logo-bar img {
      height:24px; width:auto; object-fit:contain;
      filter:brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,0.32));
    }
    .logo-fallback {
      font-family:var(--font-d); font-size:0.82rem; font-weight:300;
      letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.9);
    }
    .logo-fallback em { font-style:italic; color:var(--accent); }
    .back-btn {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 12px 5px 8px; border-radius:100px;
      background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.28);
      color:rgba(255,255,255,0.85); text-decoration:none;
      font-family:var(--font-b); font-size:0.60rem; letter-spacing:0.10em; text-transform:uppercase;
      transition:background 0.2s, color 0.2s; pointer-events:all;
    }
    .back-btn:hover { background:rgba(255,255,255,0.28); color:#fff; }
    .back-btn svg { flex-shrink:0; }

    /* ─── WORLD STAGE ───────────────────────────── */
    .world-stage {
      position:fixed; inset:0; z-index:30;
      pointer-events:none;
      perspective:1000px;
      perspective-origin:50% 50%;
    }

    /* ─── ZONA ACTIVA (revista sobre repisa) ────── */
    .active-zone {
      position:absolute;
      top:var(--header-h);
      bottom:calc(var(--shelf-bottom) + var(--shelf-h) + var(--shelf-front));
      left:0; right:0;
      display:flex; align-items:flex-end; justify-content:center;
      padding-top:10px; overflow:visible; pointer-events:none;
    }
    .active-mag {
      position:relative; pointer-events:all; cursor:grab;
      touch-action:none; user-select:none;
      transform-origin:bottom center;
      transform:rotateX(6deg);
      will-change:transform;
      width:min(58vw,290px);
      animation:magIn 0.9s var(--ease) both;
    }
    .active-mag.dragging { cursor:grabbing; }
    .active-mag.swapping { pointer-events:none; }
    @keyframes magIn {
      from { opacity:0; transform:rotateX(6deg) translateY(20px); }
      to   { opacity:1; transform:rotateX(6deg); }
    }
    .mag-body {
      width:100%; aspect-ratio:148/210;
      border-radius:3px 6px 6px 3px; overflow:hidden;
      position:relative;
      box-shadow:
        4px 12px 32px rgba(0,0,0,0.42),
        2px 4px 8px rgba(0,0,0,0.22),
        inset -2px 0 6px rgba(0,0,0,0.10);
      transition:box-shadow 0.3s, aspect-ratio 0.3s;
    }
    .mag-spine {
      position:absolute; left:0; top:0; bottom:0; width:10px;
      background:linear-gradient(90deg,rgba(0,0,0,0.42),rgba(0,0,0,0.10));
      z-index:5; border-radius:3px 0 0 3px;
    }
    .mag-inner {
      position:absolute; inset:0; left:10px;
      display:flex; flex-direction:column; overflow:hidden;
      border-radius:0 5px 5px 0; background:#FAFAF8;
    }
    .mag-head  { flex-shrink:0; padding:10px 12px 7px; display:flex; flex-direction:column; gap:3px; }
    .mag-name  { font-family:var(--font-d); font-size:clamp(0.7rem,2.2vw,0.9rem); font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.96); line-height:1.1; }
    .mag-sub   { font-size:clamp(0.44rem,1.4vw,0.52rem); font-weight:300; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.52); }
    .mag-img-wrap { flex:1; position:relative; overflow:hidden; background:#E8E4DE; min-height:0; }
    .mag-img   { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; transition:opacity 0.4s; }
    .mag-foot  { flex-shrink:0; padding:6px 12px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(0,0,0,0.07); background:#F4F1ED; }
    .mag-foot-l { font-size:clamp(0.42rem,1.3vw,0.50rem); letter-spacing:0.07em; text-transform:uppercase; color:#999; }
    .mag-foot-r { font-size:clamp(0.42rem,1.3vw,0.50rem); letter-spacing:0.07em; text-transform:uppercase; font-weight:700; color:var(--accent); }
    .mag-foot-r span { text-decoration:underline; text-underline-offset:2px; cursor:pointer; }
    .mag-soon  { position:absolute; inset:0; left:10px; background:rgba(0,0,0,0.46); display:flex; align-items:center; justify-content:center; border-radius:0 5px 5px 0; z-index:10; opacity:0; transition:opacity 0.3s; }
    .mag-body:hover .mag-soon { opacity:1; }
    .mag-soon span { font-family:var(--font-d); font-size:clamp(0.56rem,1.8vw,0.70rem); font-weight:300; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.8); }
    .dbl-hint {
      position:absolute; bottom:calc(100% + 12px); left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.30); backdrop-filter:blur(4px);
      color:rgba(255,255,255,0.85); font-size:0.58rem; letter-spacing:0.10em;
      text-transform:uppercase; padding:5px 14px; border-radius:100px;
      white-space:nowrap; pointer-events:none; opacity:0;
      animation:hintPop 5s var(--ease) 1.8s forwards;
    }
    @keyframes hintPop {
      0%  { opacity:0; transform:translateX(-50%) translateY(4px); }
      15% { opacity:1; transform:translateX(-50%); }
      75% { opacity:1; }
      100%{ opacity:0; }
    }

    /* ─── REPISA REALISTA ───────────────────────── */
    .shelf {
      position:fixed;
      bottom:var(--shelf-bottom);
      left:0; right:0;
      height:calc(var(--shelf-h) + var(--shelf-front));
      z-index:50; pointer-events:none;
    }
    /* Tablero superior — madera blanca con veta */
    .shelf-top {
      position:absolute; top:0; left:0; right:0;
      height:var(--shelf-h);
      background:linear-gradient(180deg,
        #FAFAF6 0%,
        #F0EDE6 25%,
        #E6E2D8 65%,
        #D8D3C6 100%
      );
      /* borde superior iluminado */
      box-shadow:
        0 -3px 0 rgba(255,255,255,0.95),
        0 -1px 8px rgba(255,255,255,0.60),
        inset 0 1px 0 rgba(255,255,255,0.90);
    }
    /* veta horizontal de madera pintada */
    .shelf-top::before {
      content:''; position:absolute; inset:0;
      background-image:
        repeating-linear-gradient(90deg,
          transparent 0px, transparent 22px,
          rgba(0,0,0,0.018) 22px, rgba(0,0,0,0.018) 23px,
          transparent 23px, transparent 41px,
          rgba(180,170,155,0.12) 41px, rgba(180,170,155,0.12) 42px
        );
    }
    /* sombra de la revista sobre la repisa */
    .shelf-mag-shadow {
      position:absolute; top:3px; left:50%;
      transform:translateX(-50%); width:42%; height:14px;
      background:radial-gradient(ellipse at center, rgba(0,0,0,0.30) 0%, transparent 70%);
      filter:blur(5px);
    }
    /* Frente de la repisa */
    .shelf-front-face {
      position:absolute; top:var(--shelf-h); left:0; right:0;
      height:var(--shelf-front);
      background:linear-gradient(180deg,
        #C8C3B8 0%,
        #B0A99E 60%,
        #9E9790 100%
      );
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }
    /* veta frontal */
    .shelf-front-face::before {
      content:''; position:absolute; inset:0;
      background-image:
        repeating-linear-gradient(90deg,
          transparent 0px, transparent 28px,
          rgba(0,0,0,0.025) 28px, rgba(0,0,0,0.025) 29px
        );
    }
    /* Sombra proyectada debajo */
    .shelf-shadow {
      position:absolute;
      top:calc(var(--shelf-h) + var(--shelf-front));
      left:0; right:0; height:12px;
      background:linear-gradient(180deg,
        rgba(0,0,0,0.28) 0%,
        rgba(0,0,0,0.10) 50%,
        transparent 100%
      );
    }

    /* ─── NICHO 3D ───────────────────────────────── */
    /*
      Estructura:
      .niche-wrap   → contenedor posicionado (fijo, abajo)
        .niche-box  → la caja 3D con transform-style
          .niche-back    → fondo interior
          .niche-top     → techo (sombra entrante)
          .niche-left    → pared izquierda
          .niche-right   → pared derecha
          .niche-content → contenido (lomos + label)
    */
    .niche-wrap {
      position:fixed;
      bottom:0; left:0; right:0;
      height:var(--niche-h);
      z-index:45;
    }
    /* techo del nicho — borde oscuro arriba */
    .niche-wrap::before {
      content:''; position:absolute;
      top:0; left:0; right:0; height:3px;
      background:linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.08));
      z-index:2;
    }
    /* fondo del nicho */
    .niche-back {
      position:absolute; inset:0;
      background:linear-gradient(160deg,
        #F2EEE6 0%,
        #EAE5DC 40%,
        #DDD8CE 100%
      );
    }
    /* sombra interna superior (profundidad) */
    .niche-back::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(180deg,
        rgba(0,0,0,0.16) 0%,
        rgba(0,0,0,0.04) 35%,
        transparent 70%
      );
    }
    /* sombras laterales internas */
    .niche-back::after {
      content:''; position:absolute; inset:0;
      background:
        linear-gradient(90deg,
          rgba(0,0,0,0.14) 0%,
          transparent 18%,
          transparent 82%,
          rgba(0,0,0,0.14) 100%
        );
    }
    /* paredes laterales visibles — pseudo-3D con bordes */
    .niche-side-left,
    .niche-side-right {
      position:absolute; top:0; bottom:0;
      width:18px; z-index:3;
    }
    .niche-side-left {
      left:0;
      background:linear-gradient(90deg,
        rgba(0,0,0,0.22) 0%,
        rgba(0,0,0,0.06) 100%
      );
      border-right:1px solid rgba(255,255,255,0.25);
    }
    .niche-side-right {
      right:0;
      background:linear-gradient(270deg,
        rgba(0,0,0,0.22) 0%,
        rgba(0,0,0,0.06) 100%
      );
      border-left:1px solid rgba(255,255,255,0.25);
    }
    /* techo del nicho */
    .niche-ceiling {
      position:absolute; top:0; left:18px; right:18px;
      height:10px; z-index:3;
      background:linear-gradient(180deg,
        rgba(0,0,0,0.20) 0%,
        transparent 100%
      );
    }
    /* suelo del nicho — reborde inferior */
    .niche-floor {
      position:absolute; bottom:0; left:18px; right:18px;
      height:6px; z-index:3;
      background:linear-gradient(0deg,
        rgba(0,0,0,0.10) 0%,
        transparent 100%
      );
    }

    /* ─── LOMOS DE LIBRO ────────────────────────── */
    .niche-content {
      position:absolute; inset:0;
      left:18px; right:18px;
      display:flex; flex-direction:column;
      align-items:stretch; z-index:4;
    }
    .niche-label {
      flex-shrink:0;
      padding:7px 0 4px;
      text-align:center;
      font-family:var(--font-b); font-size:0.42rem;
      font-weight:700; letter-spacing:0.26em;
      text-transform:uppercase; color:rgba(80,68,55,0.45);
    }
    .lomos-track {
      flex:1; min-height:0;
      display:flex; align-items:stretch;
      gap:5px;
      padding:4px 12px 10px;
      overflow-x:auto; overflow-y:hidden;
      scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      /* fade lateral */
      -webkit-mask-image: linear-gradient(90deg,
        transparent 0%, black 6%, black 94%, transparent 100%);
      mask-image: linear-gradient(90deg,
        transparent 0%, black 6%, black 94%, transparent 100%);
    }
    .lomos-track::-webkit-scrollbar { display:none; }

    .lomo {
      flex:0 0 auto;
      width:clamp(36px, 7vw, 56px);
      border-radius:3px 4px 4px 3px;
      position:relative; cursor:pointer;
      display:flex; flex-direction:column;
      overflow:hidden;
      box-shadow:
        2px 3px 10px rgba(0,0,0,0.28),
        inset -2px 0 4px rgba(0,0,0,0.12),
        inset 0 1px 0 rgba(255,255,255,0.20);
      transform:translateY(0px);
      transition:transform 0.28s var(--ease), box-shadow 0.28s var(--ease), filter 0.2s;
      filter:brightness(0.88);
      animation:lomoIn 0.6s var(--ease) both;
    }
    .lomo:nth-child(1){animation-delay:0.05s}
    .lomo:nth-child(2){animation-delay:0.12s}
    .lomo:nth-child(3){animation-delay:0.19s}
    @keyframes lomoIn {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0px); }
    }
    .lomo:hover {
      transform:translateY(-6px);
      filter:brightness(1.0);
      box-shadow:
        3px 8px 18px rgba(0,0,0,0.36),
        inset -2px 0 4px rgba(0,0,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.28);
    }
    .lomo.active {
      transform:translateY(-10px);
      filter:brightness(1.06);
      box-shadow:
        4px 10px 22px rgba(0,0,0,0.40),
        inset -2px 0 4px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.32);
    }
    /* lomo izquierdo oscuro (spine) */
    .lomo::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:7px;
      background:linear-gradient(90deg, rgba(0,0,0,0.38), rgba(0,0,0,0.08));
      z-index:2;
    }
    /* nombre vertical */
    .lomo-name {
      position:absolute; inset:0; left:7px;
      display:flex; align-items:center; justify-content:center;
      z-index:3; padding:8px 4px;
      font-family:var(--font-d); font-size:clamp(0.52rem,1.5vw,0.66rem);
      font-weight:600; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.90); line-height:1.1;
      writing-mode:vertical-rl; text-orientation:mixed;
      text-shadow:0 1px 4px rgba(0,0,0,0.40);
    }
    /* indicador "próximamente" */
    .lomo-soon {
      position:absolute; bottom:8px; left:7px; right:0;
      display:flex; justify-content:center; z-index:4;
    }
    .lomo-soon span {
      font-size:0.36rem; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.50); writing-mode:vertical-rl;
    }
    /* punto activo */
    .lomo-dot {
      position:absolute; top:6px; right:5px;
      width:5px; height:5px; border-radius:50%;
      background:var(--accent); opacity:0;
      transition:opacity 0.3s; z-index:5;
      box-shadow:0 0 6px rgba(201,169,97,0.8);
    }
    .lomo.active .lomo-dot { opacity:1; }

    /* ─── OVERLAY NAVEGACIÓN ─────────────────────── */
    .go-overlay {
      position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,0.50); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.35s;
    }
    .go-overlay.show { opacity:1; }
    .go-overlay span {
      font-family:var(--font-d); font-size:1.1rem;
      font-weight:300; letter-spacing:0.18em; color:#fff;
    }

    /* ─── HINT GLOBAL ────────────────────────────── */
    .global-hint {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.26); backdrop-filter:blur(5px);
      color:rgba(255,255,255,0.75); font-size:0.58rem;
      letter-spacing:0.08em; text-transform:uppercase;
      padding:5px 15px; border-radius:100px; white-space:nowrap;
      pointer-events:none; z-index:300;
      animation:ghFade 5s var(--ease) 0.5s forwards;
    }
    @keyframes ghFade {
      0%  { opacity:0; transform:translateX(-50%) translateY(4px); }
      10% { opacity:1; transform:translateX(-50%); }
      75% { opacity:1; }
      100%{ opacity:0; }
    }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media(max-width:480px){
      :root{
        --shelf-bottom:34%; --logo-bar-h:42px;
        --shelf-h:22px; --shelf-front:14px;
        --niche-h:28%;
      }
      .active-mag { width:min(68vw,220px); }
      .lomo { width:clamp(30px,7.5vw,46px); }
    }
    @media(min-width:500px) and (max-width:899px){
      .active-mag { width:min(52vw,280px); }
    }
    @media(min-width:900px){
      :root{ --shelf-bottom:30%; --niche-h:26%; }
      .active-mag { width:min(40vw,300px); }
      .lomo { width:clamp(44px,5vw,62px); }
    }
  </style>
</head>
<body>

<div class="wall-bg"></div>

<header class="gl-header">
  <div class="logo-bar">
    <a href="../main-index.html" class="back-btn" aria-label="Volver a inicio">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2.5L4.5 7 9 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Inicio
    </a>
    <img src="../branding-main/Logo-HC.jpeg" alt="Helena Caballero"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-fallback" style="display:none">G-<em>Living</em> &nbsp;&middot;&nbsp; Colecciones</span>
  </div>
</header>

<!-- REPISA -->
<div class="shelf">
  <div class="shelf-mag-shadow" id="shelfShadow"></div>
  <div class="shelf-top"></div>
  <div class="shelf-front-face"></div>
  <div class="shelf-shadow"></div>
</div>

<!-- REVISTA ACTIVA -->
<div class="world-stage" id="worldStage">
  <div class="active-zone" id="activeZone">
    <div class="active-mag" id="activeMag">
      <div class="dbl-hint">Doble toque para entrar</div>
      <div class="mag-body" id="magBody">
        <div class="mag-spine"></div>
        <div class="mag-inner">
          <div class="mag-head" id="activeHead">
            <div class="mag-name" id="activeName">Imolarte</div>
            <div class="mag-sub"  id="activeSub">by Helena Caballero</div>
          </div>
          <div class="mag-img-wrap">
            <img class="mag-img" id="activeImg" src="" alt="">
          </div>
          <div class="mag-foot">
            <span class="mag-foot-l" id="activeFootL"></span>
            <span class="mag-foot-r" id="activeFootR"></span>
          </div>
          <div class="mag-soon" id="activeSoon" style="display:none"><span>Pr&oacute;ximamente</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NICHO 3D -->
<div class="niche-wrap" id="nicheWrap">
  <div class="niche-back"></div>
  <div class="niche-side-left"></div>
  <div class="niche-side-right"></div>
  <div class="niche-ceiling"></div>
  <div class="niche-floor"></div>
  <div class="niche-content">
    <div class="niche-label">Nuestras Marcas</div>
    <div class="lomos-track" id="lomosTrack"></div>
  </div>
</div>

<div class="go-overlay" id="goOverlay"><span>Abriendo cat&aacute;logo&hellip;</span></div>
<div class="global-hint">Toca un lomo para cambiar &middot; Doble toque para entrar</div>

<script>
(function(){
'use strict';

/* ── DATOS ── */
const BRANDS = [
  { id:'imolarte', name:'Imolarte', sub:'by Helena Caballero', foot:'Cerámica italiana',
    color:'#3A3228', lomoColor:'linear-gradient(180deg,#4A3F34 0%,#2E251C 100%)',
    url:'imolarte/index.html', live:true, folder:'Imolarte',
    files:['imolarte-portada1.jpg','imolarte-portada2.jpg','imolarte-portada3.jpg','imolarte-portada4.jpg','imolarte-portada5.jpg'] },
  { id:'mlg', name:'MLG', sub:'Colección', foot:'Moda · Lifestyle',
    color:'#2C4A3E', lomoColor:'linear-gradient(180deg,#3A6054 0%,#1E3D33 100%)',
    url:'#', live:false, folder:'MLG',
    files:['MLG-portada1.jpg','MLG-portada2.jpg','MLG-portada3.jpg','MLG-portada4.jpg','MLG-portada5.jpg'] },
  { id:'tessitura', name:'Tessitura', sub:'Toscana', foot:'Textil · Toscana',
    color:'#4A3828', lomoColor:'linear-gradient(180deg,#7A5C3A 0%,#4A3020 100%)',
    url:'#', live:false, folder:'Tessitura-Toscana',
    files:['Tessitura-Toscana-portada1.jpg','Tessitura-Toscana-portada2.jpg','Tessitura-Toscana-portada3.jpg','Tessitura-Toscana-portada4.jpg','Tessitura-Toscana-portada5.jpg'] },
  { id:'eme', name:'EME', sub:'Diseño · Arte', foot:'Diseño · Arte',
    color:'#2C3A4A', lomoColor:'linear-gradient(180deg,#3A4E64 0%,#1E2E3E 100%)',
    url:'#', live:false, folder:'EME',
    files:['EME-portada-1.jpg','EME-portada-2.jpg','EME-portada-3.jpg','EME-portada-4.jpg','EME-portada-5.jpg'] },
];
const BASE        = 'images-revista-arte-de-la-mesa/';
const COOKIE_DAYS = 7;
const BRAND_RATIO = { imolarte:148/210, mlg:148/210, tessitura:148/210, eme:4/3 };

/* ── COOKIES ── */
function setCookie(n,v,d){ const e=new Date();e.setTime(e.getTime()+d*864e5);document.cookie=n+'='+v+';expires='+e.toUTCString()+';path=/;SameSite=Lax'; }
function getCookie(n){ const v=document.cookie.match('(?:^|; )'+n+'=([^;]*)');return v?decodeURIComponent(v[1]):null; }
function getPortadaIdx(b){ const r=getCookie('gl_portada_'+b.id);const p=r!==null?parseInt(r,10):-1;return p>=0?(p+1)%b.files.length:Math.floor(Math.random()*b.files.length); }
function savePortadas(){ BRANDS.forEach(b=>setCookie('gl_portada_'+b.id,portadaState[b.id],COOKIE_DAYS)); }
const portadaState={};
BRANDS.forEach(b=>{portadaState[b.id]=getPortadaIdx(b);});
window.addEventListener('pagehide',savePortadas);
window.addEventListener('beforeunload',savePortadas);

/* ── REFS ── */
let activeIdx=0;
const worldStage  = document.getElementById('worldStage');
const activeMag   = document.getElementById('activeMag');
const magBody     = document.getElementById('magBody');
const activeHead  = document.getElementById('activeHead');
const activeName  = document.getElementById('activeName');
const activeSub   = document.getElementById('activeSub');
const activeImg   = document.getElementById('activeImg');
const activeFootL = document.getElementById('activeFootL');
const activeFootR = document.getElementById('activeFootR');
const activeSoon  = document.getElementById('activeSoon');
const shelfShadow = document.getElementById('shelfShadow');
const lomosTrack  = document.getElementById('lomosTrack');
const goOverlay   = document.getElementById('goOverlay');

/* ── PAN MUNDO ── */
let worldPanX=0, worldZoom=1;
let wDragging=false, wStartX=0, wStartPanX=0;
const PAN_PCT=0.06, ZOOM_IN=1.18, ZOOM_OUT=0.96, ZOOM_STEP=0.04, CENTER_THR=0.02;
function getMaxPan(){ return window.innerWidth*PAN_PCT; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function applyWorld(){
  const pox=50+(worldPanX/window.innerWidth)*100;
  worldStage.style.perspectiveOrigin=pox+'% 50%';
  worldStage.style.transform='scale('+worldZoom+')';
  worldStage.style.transformOrigin='50% 50%';
  shelfShadow.style.left=(50+(worldPanX/window.innerWidth)*26)+'%';
}
document.addEventListener('mousedown',e=>{
  if(e.target.closest('#activeMag,#nicheWrap,.gl-header,.go-overlay'))return;
  if(e.button!==0)return;
  wDragging=true;wStartX=e.clientX;wStartPanX=worldPanX;
  document.body.style.cursor='grabbing';e.preventDefault();
});
window.addEventListener('mousemove',e=>{ if(!wDragging)return; worldPanX=clamp(wStartPanX+(e.clientX-wStartX),-getMaxPan(),getMaxPan()); applyWorld(); });
window.addEventListener('mouseup',()=>{ if(wDragging){wDragging=false;document.body.style.cursor='';} });
let wTA=false,wTSX=0,wTPS=0;
document.addEventListener('touchstart',e=>{ if(e.target.closest('#activeMag,#nicheWrap,.gl-header,.go-overlay'))return; if(e.touches.length!==1)return; wTA=true;wTSX=e.touches[0].clientX;wTPS=worldPanX; },{passive:true});
document.addEventListener('touchmove',e=>{ if(!wTA||e.touches.length!==1)return; worldPanX=clamp(wTPS+(e.touches[0].clientX-wTSX),-getMaxPan(),getMaxPan()); applyWorld(); },{passive:true});
document.addEventListener('touchend',()=>{wTA=false;});
document.addEventListener('wheel',e=>{ if(Math.abs(worldPanX)/getMaxPan()>CENTER_THR)return; e.preventDefault(); worldZoom=clamp(worldZoom+(e.deltaY<0?1:-1)*ZOOM_STEP,ZOOM_OUT,ZOOM_IN); applyWorld(); },{passive:false});

/* ── PAN REVISTA ── */
let magPanX=0,magPanY=0,mD=false,mDD=false,mSX=0,mSY=0,mSPX=0,mSPY=0;
const MLX=120,MLY=70;
function applyMagPan(){ activeMag.style.transform='rotateX(6deg) translate('+magPanX+'px,'+magPanY+'px)'; }
activeMag.addEventListener('mousedown',e=>{ if(e.button!==0)return; mD=true;mDD=false;mSX=e.clientX;mSY=e.clientY;mSPX=magPanX;mSPY=magPanY; activeMag.classList.add('dragging');e.preventDefault();e.stopPropagation(); });
window.addEventListener('mousemove',e=>{ if(!mD)return; const dx=e.clientX-mSX,dy=e.clientY-mSY; if(Math.abs(dx)>5||Math.abs(dy)>5)mDD=true; magPanX=clamp(mSPX+dx,-MLX,MLX);magPanY=clamp(mSPY+dy,-MLY,MLY); applyMagPan(); });
window.addEventListener('mouseup',()=>{ if(mD){mD=false;activeMag.classList.remove('dragging');} });
activeMag.addEventListener('dblclick',()=>{ if(!mDD)openActive(); });
let mTS2={x:0,y:0},mTPS2={x:0,y:0},mTD2=false,lastTap=0;
activeMag.addEventListener('touchstart',e=>{ if(e.touches.length!==1)return; const t=e.touches[0]; mTS2={x:t.clientX,y:t.clientY};mTPS2={x:magPanX,y:magPanY};mTD2=true; const now=Date.now(); if(now-lastTap<340){openActive();lastTap=0;return;} lastTap=now;e.stopPropagation();e.preventDefault(); },{passive:false});
activeMag.addEventListener('touchmove',e=>{ if(!mTD2||e.touches.length!==1)return; const t=e.touches[0],dx=t.clientX-mTS2.x,dy=t.clientY-mTS2.y; magPanX=clamp(mTPS2.x+dx,-MLX,MLX);magPanY=clamp(mTPS2.y+dy,-MLY,MLY); applyMagPan();e.preventDefault(); },{passive:false});
activeMag.addEventListener('touchend',()=>{mTD2=false;});

/* ── ASPECT RATIO ── */
function setMagAspectRatio(brand){
  const r=BRAND_RATIO[brand.id]||(148/210);
  magBody.style.aspectRatio=r.toString();
  activeMag.style.width = r>=1 ? 'min(70vw,360px)' : '';
}

/* ── RENDER REVISTA ACTIVA ── */
function renderActive(brand){
  activeHead.style.background=brand.color;
  activeName.textContent=brand.name;
  activeSub.textContent=brand.sub;
  activeFootL.textContent=brand.foot;
  if(brand.live){
    activeFootR.innerHTML='<span id="verBtn">Ver →</span>';
    document.getElementById('verBtn').addEventListener('click',e=>{e.stopPropagation();openActive();});
  } else {
    activeFootR.textContent='';
  }
  activeSoon.style.display=brand.live?'none':'flex';
  const src=BASE+brand.folder+'/'+brand.files[portadaState[brand.id]];
  const probe=new Image();
  probe.onload=function(){ BRAND_RATIO[brand.id]=this.naturalWidth/this.naturalHeight; setMagAspectRatio(brand); };
  probe.src=src;
  activeImg.src=src; activeImg.alt=brand.name;
  setMagAspectRatio(brand);
  magPanX=0;magPanY=0;applyMagPan();
}

/* ── RENDER LOMOS ── */
function renderLomos(){
  lomosTrack.innerHTML='';
  BRANDS.forEach((brand,idx)=>{
    const lomo=document.createElement('div');
    lomo.className='lomo'+(idx===activeIdx?' active':'');
    lomo.style.background=brand.lomoColor;
    lomo.innerHTML=
      '<div class="lomo-name">'+brand.name+'</div>'+
      '<div class="lomo-dot"></div>'+
      (!brand.live?'<div class="lomo-soon"><span>Próx.</span></div>':'');
    lomo.addEventListener('click',()=>swapActive(idx,lomo));
    lomosTrack.appendChild(lomo);
  });
}

/* ── SWAP ── */
function swapActive(newIdx,lomoEl){
  if(newIdx===activeIdx)return;
  // lomo: sube
  if(lomoEl) lomoEl.style.transform='translateY(-14px)';
  // revista: fade out
  activeMag.style.transition='opacity 0.28s ease, transform 0.28s ease';
  activeMag.style.opacity='0';
  activeMag.style.transform='rotateX(6deg) scale(0.97)';
  setTimeout(()=>{
    if(lomoEl) lomoEl.style.transform='';
    activeIdx=newIdx;
    renderActive(BRANDS[activeIdx]);
    renderLomos();
    // fade in
    activeMag.style.opacity='0';
    activeMag.style.transform='rotateX(6deg) scale(1.02)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      activeMag.style.opacity='1';
      activeMag.style.transform='rotateX(6deg) scale(1)';
      setTimeout(()=>{ activeMag.style.transition=''; applyMagPan(); },320);
    }));
  },300);
}

/* ── ABRIR CATÁLOGO ── */
function openActive(){
  const b=BRANDS[activeIdx]; if(!b.live)return;
  savePortadas(); goOverlay.classList.add('show');
  setTimeout(()=>{window.location.href=b.url;},600);
}

/* ── INIT ── */
applyWorld();
renderActive(BRANDS[activeIdx]);
renderLomos();

})();
</script>
</body>
</html>
