#          npx wrangler secret put GOOGLE_SHEETS_WEBHOOK_URL --config wrangler-webhook.toml
#          npx wrangler secret put GAS_API_TOKEN --config wrangler-webhook.toml

name             = "mlg-wompi-webhook"
